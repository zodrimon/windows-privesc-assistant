name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build Standalone Executable
        run: |
          pyinstaller --onefile --add-data "src/privesc_assistant_win/config/default_config.yaml;privesc_assistant_win/config" src/privesc_assistant_win/cli.py --name privesc-assistant-win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/privesc-assistant-win.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
